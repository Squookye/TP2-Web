<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexis Richard</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            background-color: #0c0c0c;
            background: linear-gradient(-45deg, #000000, #1a0b2e, #0f2027, #2c0000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1.main-title {
            font-size: 3rem; /* Grande taille */
            text-transform: uppercase; /* En majuscules */
            letter-spacing: 3px; /* Espacement des lettres */
            margin-bottom: 2.5rem; /* Espace sous le titre */
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* Légère ombre pour le contraste */
        }

        /* Couleurs spécifiques pour les parties du titre */
        .title-alexis {
            color: #4facfe; /* Bleu néon brillant */
        }
        .title-richard {
            color: #ff0000; /* Rouge YouTube classique */
        }

        /* --- Style de la liste de navigation --- */
        .nav-list {
            list-style-type: none; /* Pas de puces */
            display: flex;
            flex-direction: column; /* Empile les liens en une seule colonne */
            gap: 20px; /* Espace entre chaque lien */
            align-items: center;
            width: 100%; /* Prend toute la largeur disponible */
        }

        /* --- Style des boutons/liens --- */
        .nav-link {
            display: block;
            text-decoration: none; /* Pas de soulignement */
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 40px;
            width: 250px; /* Largeur fixe pour des boutons uniformes */
            text-align: center;
            
            /* Style "Glassmorphism" (effet verre dépoli moderne) */
            background: rgba(255, 255, 255, 0.05); /* Fond très transparent */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Bordure subtile */
            border-radius: 30px; /* Bords très arrondis */
            backdrop-filter: blur(5px); /* Effet de flou derrière le bouton */
            
            /* Transition douce pour l'effet de survol */
            transition: all 0.3s ease;
        }

        /* --- Effet au survol de la souris --- */
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.15); /* Le fond s'éclaircit */
            border-color: rgba(255, 255, 255, 0.5); /* La bordure devient plus visible */
            transform: translateY(-5px) scale(1.05); /* Le bouton monte légèrement et grossit */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); /* Ombre portée */
        }

    </style>
</head>
<body>

    <h1 class="main-title">
        <span class="title-alexis">Alexis</span>
        <span class="title-richard">Richard</span>
    </h1>

    <nav>
        <ul class="nav-list">
            <li><a class="nav-link" href="./TP1/index.html">TP 1</a></li>
            <li><a class="nav-link" href="./TP2/index.html">TP 2</a></li>
            <li><a class="nav-link" href="./TP3/index.html">TP 3</a></li>
            <li><a class="nav-link" href="./TP4/index.html">TP 4</a></li>
            <li><a class="nav-link" href="./TP5/index.html">TP 5</a></li>
            <li><a class="nav-link" href="./TP6/index.html">TP 6</a></li>
        </ul>
    </nav>

</body>
</html>
